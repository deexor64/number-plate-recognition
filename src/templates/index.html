<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI License Plate Detector</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            .drop-zone {
                border: 2px dashed #4f46e5;
                transition: all 0.3s;
            }
            .drop-zone.dragover {
                background: #eef2ff;
                border-color: #312e81;
            }
            .glass {
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
            }
        </style>
    </head>
    <body class="bg-slate-100 min-h-screen font-sans text-slate-900">
        <div class="container mx-auto px-4 py-10">
            <header class="text-center mb-12">
                <h1 class="text-4xl font-bold text-indigo-700 mb-2">
                    License Plate Recognition
                </h1>
                <p class="text-slate-500">
                    Digital Image Processing Module Project
                </p>
            </header>

            <div class="max-w-4xl mx-auto">
                <div
                    id="drop-zone"
                    class="drop-zone glass rounded-2xl p-12 text-center cursor-pointer mb-8"
                >
                    <div id="upload-prompt">
                        <div class="text-5xl mb-4">🚗</div>
                        <p class="text-lg font-medium">
                            Drag and drop vehicle image here
                        </p>
                        <p class="text-sm text-slate-400 mt-2">
                            or click to browse files
                        </p>
                    </div>
                    <input
                        type="file"
                        id="file-input"
                        class="hidden"
                        accept="image/*"
                    />
                </div>

                <div id="loading" class="hidden text-center py-10">
                    <div
                        class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-700 mx-auto"
                    ></div>
                    <p class="mt-4 text-indigo-600 font-medium">
                        Processing DIP Algorithms...
                    </p>
                </div>

                <div
                    id="results"
                    class="hidden grid grid-cols-1 md:grid-cols-3 gap-6"
                >
                    <div class="md:col-span-2 glass rounded-2xl p-4 shadow-xl">
                        <h3
                            class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-3"
                        >
                            Vehicle Detection
                        </h3>
                        <img
                            id="res-original"
                            class="w-full rounded-lg"
                            src=""
                        />
                    </div>

                    <div class="space-y-6">
                        <div class="glass rounded-2xl p-4 shadow-xl">
                            <h3
                                class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-3"
                            >
                                Detected Number
                            </h3>
                            <div
                                id="res-text"
                                class="text-4xl font-mono font-bold text-indigo-800 bg-indigo-50 p-4 rounded-lg text-center border-2 border-indigo-200"
                            >
                                ---
                            </div>
                        </div>
                        <div class="glass rounded-2xl p-4 shadow-xl">
                            <h3
                                class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-3"
                            >
                                DIP Preprocessing
                            </h3>
                            <div class="grid grid-cols-1 gap-4">
                                <div>
                                    <p class="text-xs text-slate-400 mb-1">
                                        Cropped Plate
                                    </p>
                                    <img
                                        id="res-cropped"
                                        class="w-full rounded border"
                                        src=""
                                    />
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 mb-1">
                                        Final Binary
                                    </p>
                                    <img
                                        id="res-processed"
                                        class="w-full rounded border bg-black"
                                        src=""
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const dropZone = document.getElementById("drop-zone");
            const fileInput = document.getElementById("file-input");
            const results = document.getElementById("results");
            const loading = document.getElementById("loading");

            dropZone.onclick = () => fileInput.click();

            dropZone.onsubmit = (e) => e.preventDefault();
            dropZone.ondragover = () => {
                dropZone.classList.add("dragover");
                return false;
            };
            dropZone.ondragleave = () => {
                dropZone.classList.remove("dragover");
                return false;
            };

            dropZone.ondrop = (e) => {
                e.preventDefault();
                dropZone.classList.remove("dragover");
                if (e.dataTransfer.files.length)
                    handleFile(e.dataTransfer.files[0]);
            };

            fileInput.onchange = () => {
                if (fileInput.files.length) handleFile(fileInput.files[0]);
            };

            function handleFile(file) {
                const formData = new FormData();
                formData.append("image", file);

                loading.classList.remove("hidden");
                results.classList.add("hidden");

                fetch("/process", { method: "POST", body: formData })
                    .then((res) => res.json())
                    .then((data) => {
                        loading.classList.add("hidden");
                        if (data.error) {
                            alert(data.error);
                        } else {
                            results.classList.remove("hidden");
                            document.getElementById("res-original").src =
                                "data:image/jpeg;base64," + data.original;
                            document.getElementById("res-cropped").src =
                                "data:image/jpeg;base64," + data.cropped;
                            document.getElementById("res-processed").src =
                                "data:image/jpeg;base64," + data.processed;
                            document.getElementById("res-text").innerText =
                                data.text || "NOT FOUND";
                        }
                    });
            }
        </script>
    </body>
</html>
